name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: scholargraph_test
          POSTGRES_USER: sguser
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sguser -d scholargraph_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://sguser:password@localhost/scholargraph_test
      DATABASE_URL: postgresql+asyncpg://sguser:password@host.docker.internal:5432/scholargraph
      SECRET_KEY: myNFMV9K7EL9PxD-lQe6gnvPKngjDRs3BeY7xhyFvqY
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENVIRONMENT: development

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Run tests
        run: uv run pytest